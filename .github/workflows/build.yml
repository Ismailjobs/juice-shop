name: Build and Push to GHCR

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # GHCR'a yazma izni için şart

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }} # Senin GitHub kullanıcı adını otomatik alır
          password: ${{ secrets.GITHUB_TOKEN }} # GitHub'ın otomatik oluşturduğu token

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # İmaj ismi: ghcr.io/kullaniciadi/juice-shop:latest
          tags: ghcr.io/${{ github.repository_owner }}/juice-shop:latest
