name: "Juice Shop Professional DevSecOps Pipeline"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Tüm job'lar için ortak izinler
permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  # 1. AŞAMA: STATİK GÜVENLİK TARAMALARI (SAST & Secrets)
  security-static:
    name: "Static Analysis (SAST)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Gitleaks: Şifre ve API Key sızıntılarını kontrol eder
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          format: sarif
          report_path: gitleaks.sarif
        continue-on-error: true

      # Semgrep: Kodun içindeki mantıksal hataları (XSS, SQLi) tarar
      - name: Semgrep Scan
        run: |
          pip install semgrep
          semgrep scan --config auto --sarif --output semgrep.sarif
        continue-on-error: true

      - name: Upload Gitleaks to Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Upload Semgrep to Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # 2. AŞAMA: DOCKER BUILD & GHCR PUSH
  build-and-push:
    name: "Docker Build & Push"
    needs: security-static # Statik taramalar bitmeden build başlamaz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # HATA ÇÖZÜMÜ: Kullanıcı adını küçük harfe çeviriyoruz (Ismailjobs -> ismailjobs)
      - name: Set Lowercase Image Tag
        run: |
          echo "IMAGE_TAG=ghcr.io/${OWNER,,}/juice-shop:latest" >> ${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_TAG }}

  # 3. AŞAMA: KONTEYNER TARAMASI (SCA)
  security-container:
    name: "Container Security (SCA)"
    needs: build-and-push # İmaj GHCR'a itildikten sonra çalışır
    runs-on: ubuntu-latest
    steps:
      # Küçük harf isimlendirmeyi bu job için de yapıyoruz
      - name: Set Lowercase Image Tag
        run: |
          echo "IMAGE_TAG=ghcr.io/${OWNER,,}/juice-shop:latest" >> ${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Scan Image with Grype
        uses: anchore/scan-action@v3
        id: scan
        with:
          image: ${{ env.IMAGE_TAG }}
          fail-build: false
          output-format: sarif

      - name: Upload Grype Results to Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: grype
