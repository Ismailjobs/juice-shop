name: "DevSecOps Security Scans"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  security-scans:
    name: "Run Security Tools"
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Security sekmesine yazma izni
      actions: read
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Gitleaks'in tüm geçmişi taraması için şart

      # 1. GITLEAKS: Secret Scan
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          format: sarif
          report_path: gitleaks.sarif
        continue-on-error: true # Hata olsa bile diğer taramalara devam et

      # 2. SEMGREP: SAST Scan
      - name: Semgrep Scan
        run: |
          pip install semgrep
          semgrep scan --config auto --sarif --output semgrep.sarif
        continue-on-error: true

      # 3. SYFT & GRYPE: SBOM and Vulnerability Scan
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          format: 'cyclonedx-json'
          output-file: 'sbom.json'

      - name: Scan SBOM for Vulnerabilities (Grype)
        uses: anchore/scan-action@v3
        id: scan
        with:
          sbom: "sbom.json"
          fail-build: false
          output-format: sarif

      # 4. UPLOAD TO SECURITY TAB
      - name: Upload Gitleaks Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Upload Semgrep Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Grype Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: grype
